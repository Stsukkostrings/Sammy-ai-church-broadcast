<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scripture Lower Third</title>
    <style>
        :root {
            color-scheme: dark;
            --text: #f8f3ea;
            --muted: rgba(248, 243, 234, 0.72);
            --accent: #ffb15c;
            --accent-soft: rgba(255, 177, 92, 0.18);
            --panel: rgba(8, 11, 16, 0.84);
            --panel-strong: rgba(8, 11, 16, 0.96);
            --line: rgba(255, 255, 255, 0.1);
            --glow: rgba(255, 177, 92, 0.24);
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            margin: 0;
            width: 100%;
            min-height: 100%;
            background: transparent;
        }

        body {
            display: flex;
            align-items: flex-end;
            justify-content: center;
            padding: 28px;
            overflow: hidden;
            color: var(--text);
            font-family: Georgia, "Times New Roman", serif;
        }

        .frame {
            width: min(1260px, 100%);
            position: relative;
            display: flex;
            justify-content: flex-start;
        }

        .halo {
            position: absolute;
            inset: auto auto 14px 28px;
            width: 220px;
            height: 220px;
            border-radius: 999px;
            background: radial-gradient(circle, var(--glow) 0%, rgba(255, 177, 92, 0) 72%);
            filter: blur(18px);
            pointer-events: none;
        }

        .lower-third {
            position: relative;
            width: min(980px, 100%);
            display: grid;
            gap: 14px;
            padding: 18px 24px 18px 22px;
            border: 1px solid var(--line);
            border-radius: 30px;
            background:
                linear-gradient(90deg, rgba(255, 177, 92, 0.14) 0, rgba(255, 177, 92, 0.02) 18%, rgba(255, 177, 92, 0) 30%),
                linear-gradient(145deg, var(--panel-strong) 0%, var(--panel) 100%);
            box-shadow:
                0 22px 60px rgba(0, 0, 0, 0.36),
                inset 0 1px 0 rgba(255, 255, 255, 0.06);
            overflow: hidden;
            transform-origin: bottom left;
            animation: settleIn 500ms cubic-bezier(0.18, 0.86, 0.22, 1) both;
        }

        .lower-third::before {
            content: "";
            position: absolute;
            inset: 0 auto 0 0;
            width: 8px;
            background: linear-gradient(180deg, #ffd6a7 0%, var(--accent) 65%, #8a4f1a 100%);
        }

        .topline {
            display: flex;
            align-items: center;
            gap: 14px;
            min-width: 0;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 34px;
            padding: 0 14px;
            border-radius: 999px;
            background: var(--accent-soft);
            border: 1px solid rgba(255, 177, 92, 0.28);
            color: var(--accent);
            font-size: 0.8rem;
            font-weight: 700;
            letter-spacing: 0.16em;
            text-transform: uppercase;
            white-space: nowrap;
        }

        .reference {
            min-width: 0;
            color: var(--accent);
            font-size: clamp(1rem, 1.7vw, 1.22rem);
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            text-wrap: balance;
        }

        .verse {
            margin: 0;
            max-width: 28ch;
            font-size: clamp(1.45rem, 2.3vw, 2.35rem);
            line-height: 1.28;
            text-shadow: 0 2px 14px rgba(0, 0, 0, 0.3);
            text-wrap: balance;
        }

        .placeholder {
            color: var(--muted);
        }

        .meta {
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--muted);
            font-size: 0.92rem;
            letter-spacing: 0.04em;
            text-transform: uppercase;
        }

        .pulse {
            width: 10px;
            height: 10px;
            border-radius: 999px;
            background: var(--accent);
            box-shadow: 0 0 0 0 rgba(255, 177, 92, 0.42);
            animation: pulse 2.2s infinite;
        }

        .is-updating {
            animation: flashUpdate 520ms ease;
        }

        @keyframes settleIn {
            from {
                opacity: 0;
                transform: translateY(26px) scale(0.98);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        @keyframes pulse {
            0% {
                box-shadow: 0 0 0 0 rgba(255, 177, 92, 0.42);
            }
            70% {
                box-shadow: 0 0 0 12px rgba(255, 177, 92, 0);
            }
            100% {
                box-shadow: 0 0 0 0 rgba(255, 177, 92, 0);
            }
        }

        @keyframes flashUpdate {
            0% {
                transform: translateY(8px);
                filter: brightness(1.16);
            }
            100% {
                transform: translateY(0);
                filter: brightness(1);
            }
        }

        @media (max-width: 840px) {
            body {
                padding: 16px;
            }

            .lower-third {
                width: 100%;
                padding: 16px 18px 16px 18px;
                border-radius: 24px;
            }

            .topline {
                flex-wrap: wrap;
            }

            .verse {
                max-width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="frame">
        <div class="halo"></div>
        <section class="lower-third" id="lowerThirdCard">
            <div class="topline">
                <div class="badge">Live Scripture</div>
                <div class="reference" id="referenceText">Scripture Overlay Ready</div>
            </div>
            <p class="verse placeholder" id="verseText">Start listening in AI Church Broadcast to stream spoken Bible verses here.</p>
            <div class="meta">
                <span class="pulse"></span>
                <span>OBS Lower Third Feed</span>
            </div>
        </section>
    </div>

    <script>
        const OVERLAY_STORAGE_KEY = "ai_cb_live_overlay_v1";
        const referenceText = document.getElementById("referenceText");
        const verseText = document.getElementById("verseText");
        const lowerThirdCard = document.getElementById("lowerThirdCard");
        let lastSignature = "";

        function renderOverlay() {
            let payload = null;
            try {
                payload = JSON.parse(localStorage.getItem(OVERLAY_STORAGE_KEY) || "null");
            } catch (error) {
                payload = null;
            }

            const nextReference = payload?.reference || "Scripture Overlay Ready";
            const nextText = payload?.text || "Start listening in AI Church Broadcast to stream spoken Bible verses here.";
            const signature = `${nextReference}::${nextText}`;

            if (!payload || !payload.text) {
                referenceText.textContent = nextReference;
                verseText.textContent = nextText;
                verseText.classList.add("placeholder");
                lastSignature = signature;
                return;
            }

            referenceText.textContent = nextReference;
            verseText.textContent = nextText;
            verseText.classList.remove("placeholder");

            if (signature !== lastSignature) {
                lowerThirdCard.classList.remove("is-updating");
                void lowerThirdCard.offsetWidth;
                lowerThirdCard.classList.add("is-updating");
            }

            lastSignature = signature;
        }

        window.addEventListener("storage", (event) => {
            if (event.key === OVERLAY_STORAGE_KEY) {
                renderOverlay();
            }
        });

        renderOverlay();
        setInterval(renderOverlay, 700);
    </script>
</body>
</html>
